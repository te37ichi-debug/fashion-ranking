name: ブランド最新情報

on:
  workflow_dispatch:

concurrency:
  group: fashion-ranking-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  brand:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Install Chrome for undetected-chromedriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 137
        id: setup-chrome

      - name: Set Chrome binary path
        run: echo "CHROME_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Run brand ranking bot
        env:
          BRAND_WEBHOOK_URL: ${{ secrets.BRAND_WEBHOOK_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DISPLAY: ":99"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python brand_ranking_bot.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Update brand ranking $(date +%Y-%m-%d)"
          git pull --rebase || true
          git push
