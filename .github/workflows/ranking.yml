name: Fashion Ranking Bot

on:
  # schedule は Cloudflare Workers Cron に移行（遅延なし）
  # - cron: '0 0 * * *'  # 毎日 09:00 JST (00:00 UTC)
  workflow_dispatch: # 手動実行 & Cloudflare Workerからのトリガー

permissions:
  contents: write

jobs:
  ranking:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Install Chrome for undetected-chromedriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 137
        id: setup-chrome

      - name: Set Chrome binary path
        run: echo "CHROME_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Run ranking bot
        env:
          RANKING_WEBHOOK_URL: ${{ secrets.RANKING_WEBHOOK_URL }}
          DISPLAY: ":99"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python ranking_bot.py

      - name: Run brand ranking bot
        env:
          BRAND_WEBHOOK_URL: ${{ secrets.BRAND_WEBHOOK_URL }}
          DISPLAY: ":99"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python brand_ranking_bot.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Update ranking $(date +%Y-%m-%d)"
          git push
