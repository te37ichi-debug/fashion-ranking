version: "3.8"

services:
  rsshub:
    image: diygod/rsshub
    ports:
      - "1200:1200"
    env_file:
      - .env

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - rsshub
    env_file:
      - .env
