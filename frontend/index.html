<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Research</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto py-8 px-4">
    <h1 class="text-3xl font-bold mb-2">Fashion Research</h1>
    <p id="status" class="text-sm text-gray-400 mb-6">接続確認中...</p>

    <!-- Site Registration -->
    <section class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4">サイト登録</h2>
      <form id="site-form" class="flex flex-wrap gap-3 items-end">
        <div class="flex-1 min-w-[150px]">
          <label class="block text-xs text-gray-500 mb-1">名前</label>
          <input name="name" required class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="Vogue Japan" />
        </div>
        <div class="flex-[2] min-w-[200px]">
          <label class="block text-xs text-gray-500 mb-1">URL</label>
          <input name="url" required class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="https://example.com/rss" />
        </div>
        <div class="min-w-[120px]">
          <label class="block text-xs text-gray-500 mb-1">タイプ</label>
          <select name="type" class="w-full border rounded-lg px-3 py-2 text-sm">
            <option value="rss">RSS</option>
            <option value="static">Static</option>
            <option value="dynamic">Dynamic</option>
            <option value="twitter">Twitter</option>
            <option value="instagram">Instagram</option>
          </select>
        </div>
        <button type="submit" class="bg-black text-white rounded-lg px-5 py-2 text-sm hover:bg-gray-800">登録</button>
      </form>
    </section>

    <!-- Sites List -->
    <section class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4">登録済みサイト</h2>
      <div id="sites-list" class="space-y-2 text-sm text-gray-500">読み込み中...</div>
    </section>

    <!-- Items Filter -->
    <section class="bg-white rounded-xl shadow p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">取得済みアイテム</h2>
        <select id="item-filter" class="border rounded-lg px-3 py-1.5 text-sm">
          <option value="">すべて</option>
        </select>
      </div>
      <div id="items-list" class="space-y-3 text-sm text-gray-500">読み込み中...</div>
    </section>
  </div>

  <script>
    const API = '';

    // --- Health ---
    fetch(`${API}/health`).then(r => r.json()).then(d => {
      const el = document.getElementById('status');
      if (d.status === 'ok') {
        el.textContent = '✅ サーバー起動確認済み';
        el.classList.add('text-green-600');
      }
    }).catch(() => {
      const el = document.getElementById('status');
      el.textContent = '❌ サーバーに接続できません';
      el.classList.add('text-red-600');
    });

    // --- Sites ---
    async function loadSites() {
      const res = await fetch(`${API}/sites`);
      const sites = await res.json();
      const container = document.getElementById('sites-list');
      const filter = document.getElementById('item-filter');

      // Update filter dropdown
      filter.innerHTML = '<option value="">すべて</option>';
      sites.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        filter.appendChild(opt);
      });

      if (sites.length === 0) {
        container.innerHTML = '<p class="text-gray-400">サイトが登録されていません</p>';
        return;
      }

      container.innerHTML = sites.map(s => `
        <div class="flex items-center justify-between border rounded-lg px-4 py-3">
          <div>
            <span class="font-medium text-gray-800">${esc(s.name)}</span>
            <span class="ml-2 text-xs bg-gray-100 text-gray-500 rounded px-2 py-0.5">${esc(s.type)}</span>
            <span class="ml-2 text-gray-400 text-xs">${esc(s.url)}</span>
          </div>
          <div class="flex gap-2">
            <button onclick="fetchSite(${s.id})" class="bg-blue-500 text-white rounded px-3 py-1 text-xs hover:bg-blue-600">取得</button>
            <button onclick="deleteSite(${s.id})" class="bg-red-500 text-white rounded px-3 py-1 text-xs hover:bg-red-600">削除</button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('site-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      await fetch(`${API}/sites`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: fd.get('name'), url: fd.get('url'), type: fd.get('type') }),
      });
      e.target.reset();
      loadSites();
    });

    async function deleteSite(id) {
      await fetch(`${API}/sites/${id}`, { method: 'DELETE' });
      loadSites();
      loadItems();
    }

    async function fetchSite(id) {
      const btn = event.target;
      btn.textContent = '取得中...';
      btn.disabled = true;
      const res = await fetch(`${API}/sites/${id}/fetch`, { method: 'POST' });
      const data = await res.json();
      btn.textContent = `+${data.added}件`;
      setTimeout(() => { btn.textContent = '取得'; btn.disabled = false; }, 1500);
      loadItems();
    }

    // --- Items ---
    async function loadItems() {
      const siteId = document.getElementById('item-filter').value;
      const url = siteId ? `${API}/items?site_id=${siteId}` : `${API}/items`;
      const res = await fetch(url);
      const items = await res.json();
      const container = document.getElementById('items-list');

      if (items.length === 0) {
        container.innerHTML = '<p class="text-gray-400">アイテムがありません</p>';
        return;
      }

      container.innerHTML = items.map(i => `
        <div class="border rounded-lg px-4 py-3 ${i.is_read ? 'bg-gray-50 opacity-60' : 'bg-white border-l-4 border-l-blue-500'}">
          <div class="flex items-start gap-3">
            ${i.image ? `<img src="${esc(i.image)}" alt="" class="shrink-0 w-20 h-20 object-cover rounded-lg" onerror="this.style.display='none'" />` : ''}
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <a href="${esc(i.url)}" target="_blank" class="font-medium text-gray-800 hover:text-blue-600 break-words">${esc(i.title)}</a>
                  ${i.published ? `<span class="ml-2 text-xs text-gray-400">${esc(i.published)}</span>` : ''}
                  ${i.summary ? `<p class="text-xs text-gray-500 mt-1 line-clamp-2">${esc(i.summary)}</p>` : ''}
                </div>
                ${!i.is_read ? `<button onclick="markRead(${i.id}, this)" class="shrink-0 text-xs bg-gray-200 hover:bg-gray-300 rounded px-3 py-1">既読</button>` : '<span class="shrink-0 text-xs text-gray-400">既読</span>'}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function markRead(id, btn) {
      await fetch(`${API}/items/${id}/read`, { method: 'PATCH' });
      loadItems();
    }

    document.getElementById('item-filter').addEventListener('change', loadItems);

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Initial load
    loadSites();
    loadItems();
  </script>
</body>
</html>
